<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACMILAN Fans Survey</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1 id="title"> ACMILAN Fans Survey</h1>
  <p id="description">Please fill the form, Thank You.</p>

  <form action="" id="survey-form">
    <label for="name" id="name-label">
      Name :
      <input type="text" id="name" placeholder="Enter Your Name" required>
    </label>

    <label for="email" id="email-label">
      Email :
      <input type="email" id="email" placeholder="Enter Your Email" required>
    </label>

    <label for="number" id="number-label">
      Age :
      <input type="number" id="number" placeholder="How old are you?" min="15" max="40">
    </label>

    <label for="dropdown" id="dropdown-label">
      How Do You Know AC Milan?
      <select name="dropdown" id="dropdown">
        <option value="instagram">Instagram</option>
        <option value="facebook">Facebook</option>
        <option value="youtube">Youtube</option>
      </select>
    </label>

    <label for="member">
      Who is your favorite member?
    </label>

    <input type="radio" name="member" value="1"> Gianluigi Donnaruma <br>
    <input type="radio" name="member" value="2"> Theo Hernandez <br>
    <input type="radio" name="member" value="3"> Simon Kjaer <br>
    <input type="radio" name="member" value="4"> Alessio Romagnoli <br>
    <input type="radio" name="member" value="5"> David Calabria <br>
    <input type="radio" name="member" value="6"> Ismael Bennacer <br>
    <input type="radio" name="member" value="7"> Frank Kessie <br>
    <input type="radio" name="member" value="8"> Ante Rebic <br>
    <input type="radio" name="member" value="9"> Hakan Calhanoglu <br>
    <input type="radio" name="member" value="10"> Zlatan Ibrahimovic <br>2
    <br>

    <label for="captain">
      Choose are the Ac Milan Rival?
    </label>

    <input type="checkbox" value="juventus"> Juventus <br>
    <input type="checkbox" value="as-roma"> As Roma <br>
    <input type="checkbox" value="inter-milan"> Inter Milan <br>
    <input type="checkbox" value="lazio"> Lazio <br>
    <input type="checkbox" value="napoli"> Napoli <br>

    <br><br>

    <label for="comments" id="comment-label">
      Any Comment or suggestions?
      <textarea id="comments" cols="30" rows="10"></textarea>
    </label>

    <button id="submit">Submit</button>
  </form>
  <script src="https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js"></script>
</body>

</html>
